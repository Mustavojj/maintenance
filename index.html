<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VELTRIX | Maintenance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #0f0f1a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .maintenance-card {
            max-width: 380px;
            width: 100%;
            background: #111115;
            border-radius: 32px;
            padding: 40px 28px;
            text-align: center;
            border: 1px solid rgba(108, 99, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .maintenance-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(108,99,255,0.05));
            border-radius: 50%;
            display: flex;
align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            border: 1px solid rgba(108,99,255,0.3);
        }

        .maintenance-icon i {
            font-size: 48px;
            color: #6C63FF;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #6C63FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .message {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 28px;
        }

        .follow-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #6C63FF, #5A52D6);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(108,99,255,0.3);
        }

        .follow-btn i {
            font-size: 1.1rem;
        }

        .follow-btn:active {
            transform: scale(0.96);
        }

        .lang-selector {
            position: fixed;
            top: 20px;
            right: 20px;
        }

        .lang-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lang-btn:active {
            transform: scale(0.95);
            background: #6C63FF;
        }

        .lang-menu {
            position: absolute;
            top: 50px;
            right: 0;
            background: #1a1a22;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            z-index: 200;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none;
        }

        .lang-menu.show {
            display: block;
        }

        .lang-option {
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .lang-option:hover {
            background: rgba(108,99,255,0.2);
        }

        .version {
            margin-top: 28px;
            font-size: 0.7rem;
            color: #555;
        }
    </style>
</head>
<body>

<div class="lang-selector">
    <button class="lang-btn" id="lang-btn"><span id="current-flag">🇬🇧</span></button>
    <div class="lang-menu" id="lang-menu">
        <button class="lang-option" data-lang="ru" data-flag="🇷🇺">Русский</button>
        <button class="lang-option" data-lang="en" data-flag="🇬🇧">English</button>
        <button class="lang-option" data-lang="tr" data-flag="🇹🇷">Türkçe</button>
        <button class="lang-option" data-lang="ar" data-flag="🇸🇦">العربية</button>
    </div>
</div>

<div class="maintenance-card">
    <div class="maintenance-icon">
        <i class="fas fa-tools"></i>
    </div>
    <h1 id="title">Under Maintenance</h1>
    <p class="message" id="message">We're currently updating the app to serve you better. Please check back soon!</p>
    <a href="https://t.me/VELTRIX_999" target="_blank" class="follow-btn" id="follow-btn">
        <i class="fab fa-telegram"></i>
        <span id="follow-text">Follow News</span>
    </a>
    <div class="version">VELTRIX v2.0</div>
</div>

<script>
    const translations = {
        ru: {
            title: "Техническое обслуживание",
            message: "Мы обновляем приложение, чтобы сделать его лучше. Загляните позже!",
            follow: "Подписаться на новости"
        },
        en: {
            title: "Under Maintenance",
            message: "We're currently updating the app to serve you better. Please check back soon!",
            follow: "Follow News"
        },
        tr: {
            title: "Bakımda",
            message: "Uygulamayı sizin için daha iyi hale getirmek üzere güncelliyoruz. Kısa sürede tekrar bekleriz!",
            follow: "Haberleri Takip Et"
        },
        ar: {
            title: "تحت الصيانة",
            message: "نقوم حالياً بتحديث التطبيق لنقدم لك خدمة أفضل. يرجى العودة قريباً!",
            follow: "متابعة الأخبار"
        }
    };

    let currentLang = localStorage.getItem('maintenance_lang') || 'en';

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('maintenance_lang', lang);
        
        document.getElementById('title').innerText = translations[lang].title;
        document.getElementById('message').innerText = translations[lang].message;
        document.getElementById('follow-text').innerText = translations[lang].follow;
        
        const flags = { ru: '🇷🇺', en: '🇬🇧', tr: '🇹🇷', ar: '🇸🇦' };
        document.getElementById('current-flag').innerText = flags[lang];
        
        if (lang === 'ar') {
            document.body.style.direction = 'rtl';
            document.querySelector('.maintenance-card').style.direction = 'rtl';
        } else {
            document.body.style.direction = 'ltr';
            document.querySelector('.maintenance-card').style.direction = 'ltr';
        }
    }

    document.getElementById('lang-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        document.getElementById('lang-menu').classList.toggle('show');
    });

    document.querySelectorAll('.lang-option').forEach(btn => {
        btn.addEventListener('click', () => {
            const lang = btn.dataset.lang;
            setLanguage(lang);
            document.getElementById('lang-menu').classList.remove('show');
        });
    });

    document.addEventListener('click', () => {
        document.getElementById('lang-menu').classList.remove('show');
    });

    setLanguage(currentLang);
</script>

</body>
                                                                               </html>
